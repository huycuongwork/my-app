name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/nextjs-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/nextjs-app:latest

      - name: SSH into VPS and Update
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }} # Cổng bạn đã đổi (ví dụ 2222)
          script: |
            # 1. Kéo bản build mới nhất về để sẵn trong máy
            docker pull ${{ secrets.DOCKER_USERNAME }}/nextjs-app:latest

            # 2. Tạo hoặc cập nhật file deployment trực tiếp từ GitHub dán vào VPS
            cat <<EOF > ~/deployment.yaml
            $(cat deployment.yaml)
            EOF

            # 3. Áp dụng vào K8s (Dùng sudo nếu user không có quyền)
            sudo kubectl apply -f ~/deployment.yaml

            # 4. Ép K8s cập nhật Image mới ngay lập tức
            sudo kubectl rollout restart deployment nextjs-deployment

            # 5. Dọn dẹp rác Docker để tiết kiệm RAM/SSD
            docker system prune -f